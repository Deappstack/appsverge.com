<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Domain For Sale</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    height:100%;
}

body{

    font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    Roboto,
    Helvetica,
    Arial,
    sans-serif;

    background:
    radial-gradient(circle at top,#ffffff,#f6f7f9 70%);

    color:#111;

    display:flex;
    justify-content:center;
    align-items:center;

    text-align:center;

    padding:40px;

}

.container{

    max-width:760px;

    animation:fade 0.8s ease;

}

.label{

    display:inline-block;

    padding:8px 16px;

    border:1px solid #e6e6e6;

    border-radius:999px;

    font-size:13px;

    color:#666;

    letter-spacing:.08em;

    text-transform:uppercase;

    margin-bottom:32px;

    background:white;

}

.domain{

    font-size:72px;

    font-weight:700;

    letter-spacing:-2px;

    line-height:1.05;

    margin-bottom:22px;

    word-break:break-word;

}

.subtitle{

    font-size:28px;

    font-weight:500;

    line-height:1.4;

    color:#333;

    margin-bottom:22px;

}

.description{

    font-size:18px;

    color:#6b7280;

    line-height:1.8;

    max-width:620px;

    margin:auto;

}

.button{

    display:inline-block;

    margin-top:50px;

    background:#111;

    color:white;

    text-decoration:none;

    padding:18px 34px;

    border-radius:14px;

    font-weight:600;

    transition:.25s;

}

.button:hover{

    background:#000;

    transform:translateY(-2px);

}

.contact{

    margin-top:50px;

    display:flex;

    justify-content:center;

    flex-wrap:wrap;

    gap:14px;

}

.contact a{

    color:#444;

    text-decoration:none;

    border:1px solid #e7e7e7;

    background:white;

    padding:14px 20px;

    border-radius:14px;

    transition:.25s;

}

.contact a:hover{

    border-color:#111;

    color:#111;

}

.footer{

    margin-top:60px;

    font-size:14px;

    color:#9ca3af;

}

@keyframes fade{

    from{

        opacity:0;
        transform:translateY(15px);

    }

    to{

        opacity:1;
        transform:translateY(0);

    }

}

@media(max-width:700px){

.domain{

    font-size:46px;

}

.subtitle{

    font-size:22px;

}

.description{

    font-size:17px;

}

.button{

    width:100%;

}

.contact{

    flex-direction:column;

}

.contact a{

    width:100%;

}

}

</style>

</head>

<body>

<div class="container">

<div class="label">
Premium Domain
</div>

<h1 class="domain">
yourdomain.com
</h1>

<div class="subtitle">
This domain is available for acquisition.
</div>

<p class="description">
A memorable, brandable domain suitable for startups,
technology companies, AI products, SaaS businesses,
or your next big idea.
</p>

<a class="button" href="mailto:hello@example.com">
Contact Owner
</a>

<div class="contact">

<a href="mailto:hello@example.com">
✉ hello@example.com
</a>

<a href="https://wa.me/923001234567">
📱 +92 300 1234567
</a>

</div>

<div class="footer">
Serious inquiries only.
</div>

</div>

</body>
</html>
