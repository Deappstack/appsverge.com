<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Domain For Sale</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#f5f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:#222;
}

.card{
    background:white;
    width:90%;
    max-width:650px;
    padding:60px 40px;
    border-radius:20px;
    box-shadow:0 20px 60px rgba(0,0,0,.08);
    text-align:center;
}

.badge{
    display:inline-block;
    padding:8px 18px;
    background:#eef4ff;
    color:#2962ff;
    border-radius:100px;
    font-size:14px;
    font-weight:600;
    margin-bottom:20px;
}

h1{
    font-size:42px;
    margin-bottom:15px;
}

.domain{
    color:#2962ff;
    font-weight:700;
}

p{
    color:#666;
    line-height:1.7;
    font-size:18px;
    margin-top:15px;
}

.contact{
    margin-top:45px;
}

.button{
    display:inline-block;
    margin-top:30px;
    padding:15px 34px;
    background:#2962ff;
    color:white;
    text-decoration:none;
    border-radius:12px;
    font-weight:600;
    transition:.2s;
}

.button:hover{
    background:#154de6;
}

.footer{
    margin-top:40px;
    font-size:14px;
    color:#999;
}
</style>

</head>

<body>

<div class="card">

<div class="badge">
Premium Domain
</div>

<h1>Domain For Sale</h1>

<p>
The domain
<strong class="domain">yourdomain.com</strong>
is available for purchase.
</p>

<p>
If you're interested in acquiring this domain,
please contact me.
</p>

<div class="contact">

<p>
📧 your@email.com
</p>

<p>
📱 +92 XXX XXXXXXXX
</p>

<a class="button" href="mailto:your@email.com">
Contact Now
</a>

</div>

<div class="footer">
Serious inquiries only.
</div>

</div>

</body>
</html>
