<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AppsVerge.com | Premium Domain</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    height:100%;
}

body{

    font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    Roboto,
    Helvetica,
    Arial,
    sans-serif;

    background:
    radial-gradient(circle at top,#ffffff,#f6f7f9 70%);

    color:#111;

    display:flex;
    justify-content:center;
    align-items:center;

    text-align:center;

    padding:40px;

}

/* logo top-right */
.logo{
    position:fixed;
    top:24px;
    right:24px;
}

.logo img{
    width:42px;
    height:42px;
    border-radius:10px;
    object-fit:cover;
    border:1px solid #e7e7e7;
    background:white;
}

/* main container */
.container{
    max-width:760px;
    animation:fade .8s ease;
}

.label{
    display:inline-block;
    padding:8px 16px;
    border:1px solid #e6e6e6;
    border-radius:999px;
    font-size:13px;
    color:#666;
    letter-spacing:.08em;
    text-transform:uppercase;
    margin-bottom:32px;
    background:white;
}

.domain{
    font-size:72px;
    font-weight:700;
    letter-spacing:-2px;
    line-height:1.05;
    margin-bottom:22px;
    word-break:break-word;
}

.subtitle{
    font-size:26px;
    font-weight:500;
    line-height:1.4;
    color:#333;
    margin-bottom:18px;
}

.description{
    font-size:18px;
    color:#6b7280;
    line-height:1.8;
    max-width:620px;
    margin:auto;
}

.button{
    display:inline-block;
    margin-top:50px;
    background:#111;
    color:white;
    text-decoration:none;
    padding:18px 34px;
    border-radius:14px;
    font-weight:600;
    transition:.25s;
}

.button:hover{
    background:#000;
    transform:translateY(-2px);
}

.email{
    margin-top:18px;
    font-size:15px;
    color:#666;
}

.footer{
    margin-top:60px;
    font-size:14px;
    color:#9ca3af;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(15px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:700px){

.domain{
    font-size:46px;
}

.subtitle{
    font-size:22px;
}

}

</style>

</head>

<body>

<!-- LOGO TOP RIGHT -->
<div class="logo">
    <img src="https://postimg.cc/qh2J5fk1" alt="logo">
</div>

<div class="container">

<div class="label">
Premium Domain
</div>

<h1 class="domain">
appsverge.com
</h1>

<div class="subtitle">
A premium domain for ambitious brands.
</div>

<p class="description">
A short, memorable and brandable domain ideal for modern startups,
AI products, SaaS platforms, and digital-first companies looking for
a strong identity online.
</p>

<!-- SINGLE CTA BUTTON -->
<a class="button" href="mailto:info@appsverge.com">
✉ Contact Owner
</a>

<!-- EMAIL UNDER BUTTON -->
<div class="email">
info@appsverge.com
</div>

<div class="footer">
Serious inquiries only.
</div>

</div>

</body>
</html>
